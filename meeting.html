<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTO Meeting Workspace</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;

    background:
    radial-gradient(circle at top,
    #2d63c8 0%,
    #0b1f4d 45%,
    #020817 100%);

    color:white;
    padding:20px;
}

/* ACCESS DENIED */
.error-box{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#ffb3b3;
    font-size:1.2rem;
}

/* MAIN LAYOUT */
.main-layout{
    display:flex;
    gap:20px;
}

/* LEFT SIDEBAR */
.sidebar{
    width:320px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:20px;

    padding:20px;

    height:90vh;

    overflow-y:auto;

    box-shadow:
    0 0 30px rgba(0,0,0,0.3);
}

.sidebar h2{
    margin-bottom:20px;
}

/* SIDEBAR MEETING ITEM */
.sidebar-meeting{
    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:14px;

    padding:15px;

    margin-bottom:15px;

    cursor:pointer;

    transition:0.3s;
}

.sidebar-meeting:hover{
    background:rgba(255,255,255,0.15);
    transform:scale(1.02);
}

.sidebar-meeting h3{
    font-size:1rem;
    margin-bottom:8px;
    color:#00c6ff;
}

.sidebar-meeting p{
    color:#d4d4d4;
    font-size:0.85rem;
}

/* RIGHT CONTENT */
.content{
    flex:1;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:20px;

    padding:25px;

    box-shadow:
    0 0 40px rgba(0,0,0,0.3);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}

.header h1{
    font-size:2rem;
}

.header p{
    color:#d4d4d4;
    margin-top:5px;
}

/* BUTTON */
.back-btn{
    padding:12px 20px;

    border:none;
    border-radius:12px;

    background:linear-gradient(135deg,#00c6ff,#0072ff);

    color:white;
    font-weight:bold;

    cursor:pointer;
}

.back-btn:hover{
    transform:scale(1.05);
}

/* FORM */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* INPUT */
.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    margin-bottom:8px;
    color:#ddd;
}

.input-group input,
.input-group textarea{
    padding:14px;

    border:none;
    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,0.12);

    border:1px solid rgba(255,255,255,0.15);

    color:white;
    font-size:1rem;
}

.input-group textarea{
    min-height:120px;
    resize:vertical;
}

.full-width{
    grid-column:1 / -1;
}

/* SAVE BUTTON */
.save-btn{
    width:100%;

    padding:15px;

    border:none;
    border-radius:12px;

    background:linear-gradient(135deg,#00c853,#009624);

    color:white;

    font-size:1rem;
    font-weight:bold;

    cursor:pointer;
}

.save-btn:hover{
    transform:scale(1.02);
}

/* VIEW AREA */
.view-area{
    margin-top:35px;
}

/* VIEW CARD */
.view-card{
    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:16px;

    padding:20px;

    margin-top:15px;
}

.view-card h2{
    color:#00c6ff;
    margin-bottom:15px;
}

.view-card p{
    margin-bottom:10px;
    color:#dcdcdc;
    line-height:1.6;
}

.view-card span{
    color:white;
    font-weight:bold;
}

/* MOBILE */
@media(max-width:1000px){

    .main-layout{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:auto;
    }

    .form-grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div id="app"></div>

<script>

/* =========================
   ACCESS CONTROL
========================= */

if(localStorage.getItem("loggedIn") !== "true"){

    document.getElementById("app").innerHTML = `

        <div class="error-box">
            ACCESS DENIED<br><br>
            Please login through dashboard.html
        </div>

    `;
}
else{

    loadPage();
}

/* =========================
   LOAD PAGE
========================= */

function loadPage(){

    document.getElementById("app").innerHTML = `

    <div class="main-layout">

        <!-- SIDEBAR -->

        <div class="sidebar">

            <h2>Meeting Archive</h2>

            <div id="meetingArchive"></div>

        </div>

        <!-- CONTENT -->

        <div class="content">

            <div class="header">

                <div>
                    <h1>CTO Meeting Workspace</h1>
                    <p>Professional Meeting Scheduling & Notes Platform</p>
                </div>

                <button class="back-btn"
                onclick="goBack()">

                    Back to Dashboard
                </button>

            </div>

            <!-- FORM -->

            <div class="form-grid">

                <div class="input-group">
                    <label>Meeting Title</label>

                    <input type="text"
                    id="meetingTitle"
                    placeholder="Enter Meeting Title">
                </div>

                <div class="input-group">
                    <label>Meeting Date</label>

                    <input type="date"
                    id="meetingDate">
                </div>

                <div class="input-group full-width">
                    <label>Meeting Purpose</label>

                    <textarea id="meetingPurpose"
                    placeholder="Enter purpose of the meeting"></textarea>
                </div>

                <div class="input-group full-width">
                    <label>Meeting Notes</label>

                    <textarea id="meetingNotes"
                    placeholder="Write meeting notes here"></textarea>
                </div>

                <div class="input-group full-width">

                    <button class="save-btn"
                    onclick="saveMeeting()">

                        SAVE MEETING

                    </button>

                </div>

            </div>

            <!-- VIEW AREA -->

            <div class="view-area">

                <h2>Meeting Details</h2>

                <div id="meetingView"></div>

            </div>

        </div>

    </div>

    `;

    loadMeetings();
}

/* =========================
   SAVE MEETING
========================= */

function saveMeeting(){

    const title =
    document.getElementById("meetingTitle").value;

    const date =
    document.getElementById("meetingDate").value;

    const purpose =
    document.getElementById("meetingPurpose").value;

    const notes =
    document.getElementById("meetingNotes").value;

    if(title === "" || date === ""){

        alert("Please enter meeting title and date.");
        return;
    }

    const meeting = {
        id:Date.now(),
        title,
        date,
        purpose,
        notes
    };

    let meetings =
    JSON.parse(localStorage.getItem("ctoMeetings")) || [];

    meetings.push(meeting);

    localStorage.setItem(
        "ctoMeetings",
        JSON.stringify(meetings)
    );

    document.getElementById("meetingTitle").value = "";
    document.getElementById("meetingDate").value = "";
    document.getElementById("meetingPurpose").value = "";
    document.getElementById("meetingNotes").value = "";

    loadMeetings();
}

/* =========================
   LOAD SIDEBAR MEETINGS
========================= */

function loadMeetings(){

    let meetings =
    JSON.parse(localStorage.getItem("ctoMeetings")) || [];

    let html = "";

    meetings.reverse().forEach(meeting => {

        html += `

        <div class="sidebar-meeting"
        onclick="viewMeeting(${meeting.id})">

            <h3>${meeting.title}</h3>

            <p>${meeting.date}</p>

        </div>

        `;
    });

    document.getElementById("meetingArchive").innerHTML = html;
}

/* =========================
   VIEW MEETING
========================= */

function viewMeeting(id){

    let meetings =
    JSON.parse(localStorage.getItem("ctoMeetings")) || [];

    let meeting =
    meetings.find(m => m.id === id);

    document.getElementById("meetingView").innerHTML = `

    <div class="view-card">

        <h2>${meeting.title}</h2>

        <p>
            <span>Date:</span><br>
            ${meeting.date}
        </p>

        <p>
            <span>Purpose:</span><br>
            ${meeting.purpose}
        </p>

        <p>
            <span>Meeting Notes:</span><br>
            ${meeting.notes}
        </p>

    </div>

    `;
}

/* =========================
   BACK BUTTON
========================= */

function goBack(){

    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
