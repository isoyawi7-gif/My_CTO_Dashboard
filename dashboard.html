<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTO Dashboard</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:radial-gradient(circle at top,#193266,#040814 70%);
    position:relative;
}

/* STARS */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(rgba(255,255,255,0.7) 1px, transparent 1px);

    background-size:120px 120px, 180px 180px, 250px 250px;
    background-position:10px 20px, 80px 120px, 40px 60px;
    opacity:0.6;
}

/* HEADER */
.top-header{
    position:absolute;
    top:20px;
    left:30px;
    right:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:100;
}

.title-area h1{
    color:white;
    font-size:2rem;
    margin-bottom:5px;
}

.title-area h2{
    color:#d4d4d4;
    font-size:1rem;
}

/* BUTTONS */
.logout-btn,
.policy-btn{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

/* logout */
.logout-btn{
    background:linear-gradient(135deg,#ff4b2b,#ff416c);
    color:white;
}

/* policy */
.policy-btn{
    margin-top:10px;
    background:linear-gradient(135deg,#0ea5e9,#2563eb);
    color:white;
}

/* DASHBOARD */
.dashboard{
    position:relative;
    width:700px;
    height:700px;
}

/* PIE */
.pie{
    width:100%;
    height:100%;
    border-radius:50%;
    background:conic-gradient(
        #d4af37 0deg 45deg,
        #c89b2b 45deg 90deg,
        #b8860b 90deg 135deg,
        #d4af37 135deg 180deg,
        #c89b2b 180deg 225deg,
        #b8860b 225deg 270deg,
        #d4af37 270deg 315deg,
        #c89b2b 315deg 360deg
    );
}

/* CENTER */
.center{
    position:absolute;
    width:230px;
    height:230px;
    border-radius:50%;
    background:#071120;
    border:5px solid gold;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    justify-content:center;
    align-items:center;
}

.center h1{
    color:gold;
    font-size:1.2rem;
}

/* SLICES */
.slice{
    position:absolute;
    width:120px;
    height:120px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    font-weight:bold;
    font-size:0.8rem;
    cursor:pointer;
    border-radius:20px;
    transition:0.3s;
}

.slice:hover{
    background:gold;
    color:black;
    transform:scale(1.1);
}

/* POSITIONS */
.s1{top:70px;left:290px;}
.s2{top:145px;right:120px;}
.s3{top:290px;right:55px;}
.s4{bottom:145px;right:120px;}
.s5{bottom:70px;left:290px;}
.s6{bottom:145px;left:120px;}
.s7{top:290px;left:55px;}
.s8{top:145px;left:120px;}

/* ================= MOBILE ================= */
@media(max-width:768px){

body{
    height:auto;
    min-height:100vh;
    overflow-y:auto;
    padding-top:20px;
}

/* HEADER FIX */
.top-header{
    position:relative;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:10px;
    margin-bottom:20px;
}

.title-area{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.title-area h1{
    font-size:1.4rem;
}

.title-area h2{
    font-size:0.9rem;
}

/* buttons */
.policy-btn,
.logout-btn{
    width:240px;
}

/* dashboard */
.dashboard{
    width:95vw;
    height:95vw;
    max-width:420px;
    max-height:420px;
}

/* center */
.center{
    width:120px;
    height:120px;
}

.center h1{
    font-size:0.8rem;
}

/* slices */
.slice{
    width:70px;
    height:70px;
    font-size:0.45rem;
}

/* MOBILE POSITION FIX */
.s1{top:10%;left:50%;transform:translateX(-50%);}
.s2{top:18%;right:8%;}
.s3{top:45%;right:0;}
.s4{bottom:18%;right:8%;}
.s5{bottom:10%;left:50%;transform:translateX(-50%);}
.s6{bottom:18%;left:8%;}
.s7{top:45%;left:0;}
.s8{top:18%;left:8%;}
}
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-box{
    background:#0b1f3a;
    padding:25px;
    border-radius:15px;
    text-align:center;
    width:300px;
    border:1px solid rgba(255,255,255,0.2);
}

.modal-box h2{
    color:#00c6ff;
    margin-bottom:15px;
}

.modal-box input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    text-align:center;
    margin-bottom:15px;
}

.modal-box button{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.modal-box button:first-of-type{
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
}

.close-btn{
    background:linear-gradient(135deg,#ff4b2b,#ff416c);
    color:white;
}
</style>
</head>

<body>

<header class="top-header">

<div class="title-area">
    <h1>ISO YAWI</h1>
    <h2>CTO Workforce Operations Dashboard</h2>

    <button class="policy-btn" onclick="openPolicyGate()"
        📚 Policies & Documentation
    </button>
</div>

<button class="logout-btn" onclick="logout()">Logout</button>

</header>

<div class="dashboard">

    <div class="pie"></div>

    <div class="center">
        <h1>CTO<br>DASHBOARD</h1>
    </div>

    <div class="slice s1" onclick="openPage('philosophy.html')">PHILOSOPHY</div>
    <div class="slice s2" onclick="openPage('meeting.html')">MEETING</div>
    <div class="slice s3" onclick="openPage('todo.html')">TO DO</div>
    <div class="slice s4" onclick="openPage('budget.html')">BUDGET</div>
    <div class="slice s5" onclick="openPage('technical.html')">PROJECTS</div>
    <div class="slice s6" onclick="openPage('logistics.html')">LOGISTICS</div>
    <div class="slice s7" onclick="openPage('future.html')">FUTURE</div>
    <div class="slice s8" onclick="openPage('goals.html')">GOALS</div>

</div>

<script>

if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}

function openPage(page){
    localStorage.setItem("loggedIn","true");
    window.location.href = page;
}

function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href = "index.html";
}

</script>
<script>

function openPolicyGate(){
    document.getElementById("policyModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("policyModal").style.display = "none";
    document.getElementById("error").innerText = "";
    document.getElementById("policyCode").value = "";
}

function checkPolicyCode(){

    let code = document.getElementById("policyCode").value;

    if(code === "5555"){
        // SUCCESS → redirect to policies page
        window.location.href = "policies.html";
    }else{
        document.getElementById("error").innerText = "Wrong Passcode!";
    }
}

</script>
<!-- POLICY PASSCODE MODAL -->
<div id="policyModal" class="modal">
    <div class="modal-box">
        <h2>Enter Policy Access Code</h2>

        <input type="password" id="policyCode" placeholder="Enter 4-digit code">

        <button onclick="checkPolicyCode()">Enter</button>

        <p id="error" style="color:#ff8080;margin-top:10px;"></p>

        <button class="close-btn" onclick="closeModal()">Cancel</button>
    </div>
</div>
</body>
</html>
