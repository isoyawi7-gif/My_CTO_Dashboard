<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTO Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, sans-serif;

    background:
    radial-gradient(circle at top,
    rgba(25,50,110,0.9),
    #040814 70%);
    position:relative;
}

/* STARS */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(rgba(255,255,255,0.7) 1px, transparent 1px);

    background-size:120px 120px, 180px 180px, 250px 250px;
    background-position:10px 20px, 80px 120px, 40px 60px;
    opacity:0.6;
}

/* HEADER */
.top-header{
    position:absolute;
    top:20px;
    left:30px;
    right:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:100;
}

.title-area h1{
    color:white;
    font-size:2rem;
    letter-spacing:2px;
    margin-bottom:5px;
}

.title-area h2{
    color:#d4d4d4;
    font-size:1rem;
    font-weight:normal;
}

/* LOGOUT */
.logout-btn{
    padding:12px 24px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#ff4b2b,#ff416c);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s ease;
}

.logout-btn:hover{
    transform:scale(1.05);
}

/* DASHBOARD */
.dashboard{
    position:relative;
    width:700px;
    height:700px;
}

/* PIE */
.pie{
    width:100%;
    height:100%;
    border-radius:50%;
    background:conic-gradient(
        #d4af37 0deg 45deg,
        #c89b2b 45deg 90deg,
        #b8860b 90deg 135deg,
        #d4af37 135deg 180deg,
        #c89b2b 180deg 225deg,
        #b8860b 225deg 270deg,
        #d4af37 270deg 315deg,
        #c89b2b 315deg 360deg
    );
    box-shadow:0 0 50px rgba(255,215,0,0.2),
               inset 0 0 50px rgba(0,0,0,0.8);
}

/* CENTER */
.center{
    position:absolute;
    width:230px;
    height:230px;
    border-radius:50%;
    background:#071120;
    border:5px solid gold;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.center h1{
    color:gold;
    font-size:1.2rem;
}

/* SLICES */
.slice{
    position:absolute;
    width:120px;
    height:120px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    font-weight:bold;
    font-size:0.8rem;
    cursor:pointer;
    border-radius:20px;
    transition:0.3s ease;
}

.slice:hover{
    background:gold;
    color:black;
    transform:scale(1.1);
}

/* POSITIONS */
.s1{top:70px;left:290px;}
.s2{top:145px;right:120px;}
.s3{top:290px;right:55px;}
.s4{bottom:145px;right:120px;}
.s5{bottom:70px;left:290px;}
.s6{bottom:145px;left:120px;}
.s7{top:290px;left:55px;}
.s8{top:145px;left:120px;}

</style>
</head>

<body>

<!-- HEADER -->
<header class="top-header">

    <div class="title-area">
        <h1>ISO YAWI</h1>
        <h2>CTO Workforce Operations Dashboard</h2>
    </div>

    <button class="logout-btn" onclick="logout()">
        Logout
    </button>

</header>

<!-- DASHBOARD -->
<div class="dashboard">

    <div class="pie"></div>

    <div class="center">
        <h1>CTO<br>DASHBOARD</h1>
    </div>

    <!-- SLICES -->
    <div class="slice s1" onclick="openPage('philosophy.html')">
        PHILOSOPHIES, MISSION AND VISION
    </div>

    <div class="slice s2" onclick="openPage('meeting.html')">
        MEETING
    </div>

    <div class="slice s3" onclick="openPage('todo.html')">
        TO DO
    </div>

    <div class="slice s4" onclick="openPage('budget.html')">
        BUDGET
    </div>

    <div class="slice s5" onclick="openPage('technical.html')">
        PROJECTS
    </div>

    <div class="slice s6" onclick="openPage('warehouse.html')">
        LOGISTICS
    </div>

    <div class="slice s7" onclick="openPage('future.html')">
        FUTURE
    </div>

    <div class="slice s8" onclick="openPage('goals.html')">
        GOALS
    </div>

</div>

<script>

/* =========================
   AUTH CHECK
========================= */
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}

/* =========================
   NAVIGATION
========================= */
function openPage(page){
    window.location.href = page;
}

/* =========================
   LOGOUT
========================= */
function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href = "index.html";
}

</script>

</body>
</html>
