<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTO Vision & Philosophies</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background: radial-gradient(circle at top,#2d63c8 0%,#0b1f4d 45%,#020817 100%);
    color:white;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:30px;
}

/* HEADER */
.header{
    width:100%;
    max-width:1000px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.header h1{
    font-size:1.6rem;
}

.back-btn{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
    font-weight:bold;
}

.back-btn:hover{
    transform:scale(1.05);
}

/* CARD */
.container{
    width:100%;
    max-width:1000px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(18px);
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.section-title{
    font-size:1.3rem;
    margin-bottom:15px;
    color:#ffffff;
}

ul{
    margin-left:20px;
    line-height:1.8;
    color:#dcdcdc;
}

.error{
    color:#ffb3b3;
    font-size:1rem;
    text-align:center;
    margin-top:40px;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

// ==========================
// ACCESS CONTROL
// ==========================
function checkAccess(){
    const isLoggedIn = sessionStorage.getItem("auth");

    if(!isLoggedIn){
        document.getElementById("app").innerHTML = `
            <div class='error'>
                ERROR: Unauthorized Access. Please login through index page.
            </div>
        `;
        return false;
    }
    return true;
}

// ==========================
// PAGE LOAD
// ==========================
if(checkAccess()){

    document.getElementById("app").innerHTML = `

    <div style="width:100%;max-width:1000px;">

        <div class="header">
            <h1>CTO Vision & Philosophies</h1>
            <button class="back-btn" onclick="goBack()">Back to Dashboard</button>
        </div>

        <div class="container">

            <div class="section-title">CTO Core Philosophies</div>

            <ul>
                <li>Technology must solve real operational problems, not create complexity.</li>
                <li>Infrastructure must be scalable, resilient, and future-ready.</li>
                <li>Security is not a feature — it is a foundation.</li>
                <li>Automation must replace repetitive manual network operations.</li>
                <li>Data-driven decision making over assumptions.</li>
                <li>Systems must be designed for uptime and fault tolerance.</li>
                <li>Continuous learning and innovation in telecom and IT systems.</li>
                <li>Build locally, design globally competitive infrastructure.</li>
            </ul>

            <br>

            <div class="section-title">Vision Statement</div>

            <ul>
                <li>To build a fully intelligent, self-healing telecommunications infrastructure ecosystem in Papua New Guinea.</li>
                <li>To integrate AI, automation, and network engineering into national digital transformation.</li>
                <li>To develop next-generation engineers capable of leading global ICT systems.</li>
            </ul>

        </div>

    </div>

    `;
}

// ==========================
// NAVIGATION
// ==========================
function goBack(){
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
