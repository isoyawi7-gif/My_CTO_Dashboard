<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logistics Operations Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    min-height:100vh;

    background:
    radial-gradient(circle at top,
    #1b5cff 0%,
    #0b1f3a 45%,
    #020817 100%);

    color:white;

    padding:20px;
}

/* ACCESS DENIED */
.error-box{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#ffb3b3;
    font-size:1.2rem;
}

/* MAIN */
.main-layout{
    display:flex;
    gap:20px;
}

/* SIDEBAR */
.sidebar{
    width:320px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    padding:20px;
    height:90vh;
    overflow-y:auto;
}

.sidebar h2{
    color:#00c6ff;
    margin-bottom:15px;
}

/* CARD */
.log-card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:14px;
    padding:15px;
    margin-bottom:15px;
    cursor:pointer;
    transition:0.3s;
}

.log-card:hover{
    transform:scale(1.02);
    background:rgba(255,255,255,0.15);
}

.log-card h3{
    color:#00c6ff;
}

.log-card p{
    font-size:0.85rem;
    color:#d4d4d4;
}

/* CONTENT */
.content{
    flex:1;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    padding:25px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.header h1{
    font-size:2rem;
}

.header p{
    color:#d4d4d4;
}

/* BUTTON */
.back-btn{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* FORM */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    margin-bottom:8px;
    color:#ddd;
}

.input-group input,
.input-group select,
.input-group textarea{
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.15);
    color:white;
}

.full{
    grid-column:1 / -1;
}

/* SAVE */
.save-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#00c853,#009624);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* VIEW */
.view-card{
    margin-top:20px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:15px;
    padding:20px;
}

.view-card h2{
    color:#00c6ff;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:20px;
    padding:15px;
    color:#d4d4d4;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
}

/* MOBILE */
@media(max-width:1000px){
    .main-layout{flex-direction:column;}
    .sidebar{width:100%;height:auto;}
    .form-grid{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div id="app"></div>

<script>

/* ACCESS CONTROL (FIXED VERSION) */

const isAuthorized = localStorage.getItem("loggedIn") === "true";

if(!isAuthorized){

    document.getElementById("app").innerHTML = `
        <div class="error-box">
            ACCESS DENIED<br><br>
            Please login from dashboard.
        </div>
    `;

}else{
    loadPage();
}

/* LOAD PAGE */
function loadPage(){

document.getElementById("app").innerHTML = `

<div class="main-layout">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Logistics Archive</h2>
    <div id="archive"></div>
</div>

<!-- CONTENT -->
<div class="content">

    <div class="header">
        <div>
            <h1>Logistics Operations</h1>
            <p>Transport • Containers • Tracking • Compliance</p>
        </div>

        <button class="back-btn" onclick="goBack()">
            Back to Dashboard
        </button>
    </div>

    <!-- FORM -->
    <div class="form-grid">

        <div class="input-group">
            <label>Mode of Transport</label>
            <select id="mode">
                <option>Road</option>
                <option>Sea</option>
                <option>Air</option>
                <option>Rail</option>
            </select>
        </div>

        <div class="input-group">
            <label>Transport Company</label>
            <input id="company" type="text">
        </div>

        <div class="input-group">
            <label>Container Number</label>
            <input id="container" type="text">
        </div>

        <div class="input-group">
            <label>Seal Number</label>
            <input id="seal" type="text">
        </div>

        <div class="input-group">
            <label>Origin</label>
            <input id="origin" type="text">
        </div>

        <div class="input-group">
            <label>Destination</label>
            <input id="destination" type="text">
        </div>

        <div class="input-group">
            <label>Status</label>
            <select id="status">
                <option>Pending</option>
                <option>In Transit</option>
                <option>Delivered</option>
                <option>Delayed</option>
            </select>
        </div>

        <div class="input-group">
            <label>Reference / Job ID</label>
            <input id="job" type="text">
        </div>

        <div class="input-group full">
            <button class="save-btn" onclick="saveLog()">
                SAVE LOGISTICS RECORD
            </button>
        </div>

    </div>

    <!-- VIEW -->
    <div class="view-card">
        <h2>Record Details</h2>
        <div id="view"></div>
    </div>

</div>

</div>

<footer class="footer">
Powered by Iso Yawi • Logistics Intelligence System
</footer>

`;

loadData();
}

/* SAVE */
function saveLog(){

let logs = JSON.parse(localStorage.getItem("logisticsData")) || [];

logs.push({
id:Date.now(),
mode:document.getElementById("mode").value,
company:document.getElementById("company").value,
container:document.getElementById("container").value,
seal:document.getElementById("seal").value,
origin:document.getElementById("origin").value,
destination:document.getElementById("destination").value,
status:document.getElementById("status").value,
job:document.getElementById("job").value
});

localStorage.setItem("logisticsData", JSON.stringify(logs));

loadData();
alert("Logistics Record Saved");
}

/* LOAD */
function loadData(){

let logs = JSON.parse(localStorage.getItem("logisticsData")) || [];

let html = "";

logs.reverse().forEach(l => {

html += `
<div class="log-card" onclick="viewLog(${l.id})">
<h3>${l.company}</h3>
<p>${l.mode} | ${l.status}</p>
</div>
`;

});

document.getElementById("archive").innerHTML =
html || "<p>No records found</p>";
}

/* VIEW */
function viewLog(id){

let logs = JSON.parse(localStorage.getItem("logisticsData")) || [];

let l = logs.find(x => x.id == id);

document.getElementById("view").innerHTML = `

<h2>${l.company}</h2>
<p><b>Mode:</b> ${l.mode}</p>
<p><b>Container:</b> ${l.container}</p>
<p><b>Seal:</b> ${l.seal}</p>
<p><b>Origin:</b> ${l.origin}</p>
<p><b>Destination:</b> ${l.destination}</p>
<p><b>Status:</b> ${l.status}</p>
<p><b>Job ID:</b> ${l.job}</p>

`;

}

/* BACK */
function goBack(){
sessionStorage.setItem("entry","dashboard");
window.location.href = "dashboard.html";
}

</script>

</body>
</html>
