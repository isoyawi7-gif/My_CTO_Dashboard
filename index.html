<style>

.pie{
    width:100%;
    height:100%;
    border-radius:50%;

    background:

        #d4af37 0deg 45deg,
        #c89b2b 45deg 90deg,

        #d4af37 135deg 180deg,
        #c89b2b 180deg 225deg,
        #b8860b 225deg 270deg,
        #d4af37 270deg 315deg,

}

.dashboard:hover .pie{
