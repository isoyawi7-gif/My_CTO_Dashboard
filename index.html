<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CTO Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    font-family:Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

/* MAIN DASHBOARD */
.dashboard-container{
    position:relative;
    width:95vw;
    max-width:700px;
    aspect-ratio:1/1;
}

/* OUTER CIRCLE */
.outer-circle{
    width:100%;
    height:100%;
    border-radius:50%;
    position:relative;
    background:
    conic-gradient(
        #d4af37 0deg 45deg,
        #b8860b 45deg 90deg,
        #d4af37 90deg 135deg,
        #b8860b 135deg 180deg,
        #d4af37 180deg 225deg,
        #b8860b 225deg 270deg,
        #d4af37 270deg 315deg,
        #b8860b 315deg 360deg
    );

    box-shadow:
    0 0 25px rgba(212,175,55,0.5),
    inset 0 0 20px rgba(0,0,0,0.7);
}

/* INNER CIRCLE */
.inner-circle{
    position:absolute;
    width:52%;
    height:52%;
    background:#111;
    border:6px solid gold;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
    z-index:10;

    box-shadow:
    0 0 20px rgba(255,215,0,0.5),
    inset 0 0 15px rgba(255,215,0,0.2);
}

.inner-circle h1{
    font-size:1.4rem;
    line-height:1.5;
    color:gold;
    letter-spacing:1px;
}

/* PIE SECTIONS */
.section{
    position:absolute;
    width:120px;
    text-align:center;
    color:white;
    font-weight:bold;
    padding:12px;
    border-radius:15px;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(5px);
    transition:0.3s ease;
    cursor:pointer;
    border:2px solid rgba(255,215,0,0.4);
}

.section:hover{
    transform:scale(1.1);
    background:gold;
    color:black;
    box-shadow:0 0 20px gold;
}

/* POSITIONING */
.s1{ top:4%; left:38%; }
.s2{ top:16%; right:6%; }
.s3{ top:40%; right:-2%; }
.s4{ bottom:12%; right:12%; }
.s5{ bottom:5%; left:38%; }
.s6{ bottom:16%; left:5%; }
.s7{ top:42%; left:-2%; }
.s8{ top:15%; left:8%; }

/* MOBILE */
@media(max-width:600px){

    .dashboard-container{
        width:98vw;
    }

    .section{
        width:90px;
        font-size:0.7rem;
        padding:8px;
    }

    .inner-circle h1{
        font-size:1rem;
    }
}
</style>
</head>

<body>

<div class="dashboard-container">

    <div class="outer-circle"></div>

    <!-- CENTER -->
    <div class="inner-circle">
        <h1>
            CHIEF <br>
            TECHNICAL <br>
            OFFICER <br>
            DASHBOARD
        </h1>
    </div>

    <!-- PIE MENU SECTIONS -->
    <div class="section s1" onclick="openPage('Goals, Targets & Plans')">
        Goals / Targets / Plans
    </div>

    <div class="section s2" onclick="openPage('Policies & Philosophy')">
        Policies & Philosophy
    </div>

    <div class="section s3" onclick="openPage('Marketing Schedule')">
        Marketing Schedule
    </div>

    <div class="section s4" onclick="openPage('Things To Do')">
        Things To Do
    </div>

    <div class="section s5" onclick="openPage('Technical Budget CAPEX/OPEX')">
        Technical Budget CAPEX/OPEX
    </div>

    <div class="section s6" onclick="openPage('Technology')">
        Technology
    </div>

    <div class="section s7" onclick="openPage('Projects')">
        Projects
    </div>

    <div class="section s8" onclick="openPage('Things To Do')">
        Things To Do
    </div>

</div>

<script>
function openPage(section){

    alert("Opening: " + section);

    /*
    LATER YOU CAN LINK PAGES LIKE:

    if(section === "Projects"){
        window.location.href = "projects.html";
    }

    */
}
</script>

</body>
</html>
