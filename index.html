<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTO Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b0b;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* MAIN CIRCLE */
.dashboard{
    position:relative;
    width:90vw;
    max-width:700px;
    aspect-ratio:1/1;
}

/* OUTER RING */
.ring{
    width:100%;
    height:100%;
    border-radius:50%;
    position:relative;

    background:
    conic-gradient(
        #c89b2b 0deg 45deg,
        #d4af37 45deg 90deg,
        #b8860b 90deg 135deg,
        #d4af37 135deg 180deg,
        #c89b2b 180deg 225deg,
        #d4af37 225deg 270deg,
        #b8860b 270deg 315deg,
        #d4af37 315deg 360deg
    );

    box-shadow:
    0 0 40px rgba(255,215,0,0.25),
    inset 0 0 30px rgba(0,0,0,0.8);
}

/* INNER CENTER */
.center{
    position:absolute;
    width:52%;
    height:52%;
    background:#111;
    border:5px solid gold;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:10;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;

    box-shadow:
    0 0 20px rgba(255,215,0,0.4),
    inset 0 0 20px rgba(255,215,0,0.15);
}

.center h1{
    color:gold;
    font-size:1.5rem;
    line-height:1.5;
    letter-spacing:1px;
}

/* PIE SECTIONS */
.slice{
    position:absolute;
    width:130px;
    text-align:center;
    color:white;
    font-weight:bold;
    font-size:0.85rem;
    line-height:1.2;
    cursor:pointer;
    transition:0.3s;
    z-index:20;
}

.slice:hover{
    color:black;
    background:gold;
    padding:10px;
    border-radius:12px;
    box-shadow:0 0 20px gold;
    transform:scale(1.08);
}

/* POSITION INSIDE RING */

.s1{
    top:10%;
    left:38%;
    transform:translateX(-50%);
}

.s2{
    top:20%;
    right:10%;
}

.s3{
    top:43%;
    right:4%;
}

.s4{
    bottom:18%;
    right:14%;
}

.s5{
    bottom:8%;
    left:50%;
    transform:translateX(-50%);
}

.s6{
    bottom:18%;
    left:12%;
}

.s7{
    top:43%;
    left:5%;
}

.s8{
    top:20%;
    left:10%;
}

/* MOBILE */
@media(max-width:600px){

    .slice{
        width:90px;
        font-size:0.62rem;
    }

    .center h1{
        font-size:1rem;
    }
}

</style>
</head>

<body>

<div class="dashboard">

    <!-- GOLD PIE -->
    <div class="ring"></div>

    <!-- CENTER -->
    <div class="center">
        <h1>
            CHIEF<br>
            TECHNICAL<br>
            OFFICER<br>
            DASHBOARD
        </h1>
    </div>

    <!-- TEXT INSIDE PIE -->

    <div class="slice s1" onclick="goPage('Goals')">
        GOALS<br>
        TARGETS<br>
        PLANS
    </div>

    <div class="slice s2" onclick="goPage('Policies')">
        POLICIES<br>
        &<br>
        PHILOSOPHY
    </div>

    <div class="slice s3" onclick="goPage('Marketing')">
        MARKETING<br>
        SCHEDULE
    </div>

    <div class="slice s4" onclick="goPage('Things')">
        THINGS<br>
        TO DO
    </div>

    <div class="slice s5" onclick="goPage('Budget')">
        TECHNICAL<br>
        BUDGET<br>
        CAPEX/OPEX
    </div>

    <div class="slice s6" onclick="goPage('Technology')">
        TECHNOLOGY
    </div>

    <div class="slice s7" onclick="goPage('Projects')">
        PROJECTS
    </div>

    <div class="slice s8" onclick="goPage('Tasks')">
        TASKS<br>
        TODO
    </div>

</div>

<script>

function goPage(section){

    alert("Opening " + section);

    /*
    EXAMPLE PAGE LINKS:

    if(section === "Projects"){
        window.location.href = "projects.html";
    }

    */

}

</script>

</body>
</html>
