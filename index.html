<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CTO Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b0b;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* MAIN DASHBOARD */

.dashboard{
    position:relative;
    width:90vw;
    max-width:750px;
    aspect-ratio:1/1;
}

/* PIE */

.pie{
    width:100%;
    height:100%;
    border-radius:50%;
    position:relative;

    background:
    conic-gradient(
        #d4af37 0deg 45deg,
        #c89b2b 45deg 90deg,
        #b8860b 90deg 135deg,
        #d4af37 135deg 180deg,
        #c89b2b 180deg 225deg,
        #b8860b 225deg 270deg,
        #d4af37 270deg 315deg,
        #c89b2b 315deg 360deg
    );

    box-shadow:
    0 0 40px rgba(255,215,0,0.3),
    inset 0 0 40px rgba(0,0,0,0.8);
}

/* CENTER */

.center{
    position:absolute;
    width:42%;
    height:42%;
    border-radius:50%;
    background:#111;
    border:5px solid gold;

    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    z-index:50;

    box-shadow:
    0 0 25px rgba(255,215,0,0.4),
    inset 0 0 15px rgba(255,215,0,0.2);
}

.center h1{
    color:gold;
    font-size:1.5rem;
    line-height:1.5;
}

/* DIVIDER LINES */

.line{
    position:absolute;
    width:3px;
    height:50%;
    background:#111;
    top:0;
    left:50%;
    transform-origin:bottom center;
    z-index:5;
}

.l1{ transform:translateX(-50%) rotate(0deg); }
.l2{ transform:translateX(-50%) rotate(45deg); }
.l3{ transform:translateX(-50%) rotate(90deg); }
.l4{ transform:translateX(-50%) rotate(135deg); }
.l5{ transform:translateX(-50%) rotate(180deg); }
.l6{ transform:translateX(-50%) rotate(225deg); }
.l7{ transform:translateX(-50%) rotate(270deg); }
.l8{ transform:translateX(-50%) rotate(315deg); }

/* PIE SLICE BUTTONS */

.slice{
    position:absolute;
    width:22%;
    height:22%;
    z-index:20;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    padding:10px;

    color:white;
    font-weight:bold;
    font-size:0.85rem;
    line-height:1.2;

    cursor:pointer;
    transition:0.3s ease;

    border-radius:50%;
}

/* REACTIVE EFFECT */

.slice:hover{
    background:rgba(255,215,0,0.95);
    color:black;
    transform:scale(1.08);
    box-shadow:0 0 25px gold;
}

/* POSITIONS INSIDE PIE SHAPE */

.s1{
    top:6%;
    left:39%;
}

.s2{
    top:20%;
    right:10%;
}

.s3{
    top:40%;
    right:4%;
}

.s4{
    bottom:18%;
    right:12%;
}

.s5{
    bottom:4%;
    left:39%;
}

.s6{
    bottom:18%;
    left:12%;
}

.s7{
    top:40%;
    left:4%;
}

.s8{
    top:20%;
    left:10%;
}

/* MOBILE */

@media(max-width:600px){

    .slice{
        font-size:0.62rem;
    }

    .center h1{
        font-size:1rem;
    }
}

</style>
</head>

<body>

<div class="dashboard">

    <!-- PIE -->
    <div class="pie"></div>

    <!-- DIVIDERS -->
    <div class="line l1"></div>
    <div class="line l2"></div>
    <div class="line l3"></div>
    <div class="line l4"></div>
    <div class="line l5"></div>
    <div class="line l6"></div>
    <div class="line l7"></div>
    <div class="line l8"></div>

    <!-- CENTER -->
    <div class="center">
        <h1>
            CHIEF<br>
            TECHNICAL<br>
            OFFICER<br>
            DASHBOARD
        </h1>
    </div>

    <!-- ALL TITLES INSIDE PIE SLICES -->

    <div class="slice s1" onclick="openPage('goals.html')">
        Goals & Targets
    </div>

    <div class="slice s2" onclick="openPage('policies.html')">
        Policies & Philosophies
    </div>

    <div class="slice s3" onclick="openPage('meeting.html')">
        Meeting & Schedule
    </div>

    <div class="slice s4" onclick="openPage('todo.html')">
        Things To Do
    </div>

    <div class="slice s5" onclick="openPage('budget.html')">
        Technical Budget<br>
        (CAPEX/OPEX)
    </div>

    <div class="slice s6" onclick="openPage('technology.html')">
        Technology
    </div>

    <div class="slice s7" onclick="openPage('projects.html')">
        Projects
    </div>

    <div class="slice s8" onclick="openPage('operations.html')">
        Operations &<br>
        Future Plans
    </div>

</div>

<script>

function openPage(page){

    // Future page linking
    alert("Opening: " + page);

    // Example:
    // window.location.href = page;
}

</script>

</body>
</html>
