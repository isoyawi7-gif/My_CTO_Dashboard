<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTO Pie Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial,sans-serif;

    background:
    radial-gradient(circle at top,
    #1c3d73 0%,
    #071120 70%,
    #020611 100%);

    position:relative;
}

/* STARS */

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;

    background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 1px, transparent 1px);

    background-size:
    140px 140px,
    220px 220px;

    opacity:0.5;
}

/* PIE CONTAINER */

.dashboard{
    position:relative;
    width:700px;
    height:700px;
}

/* PIE */

.pie{

    width:100%;
    height:100%;

    border-radius:50%;

    position:absolute;

    background:
    conic-gradient(
        #00bcd4 0deg 45deg,
        #ff9800 45deg 90deg,
        #ff5722 90deg 135deg,
        #e91e63 135deg 180deg,
        #9c27b0 180deg 225deg,
        #3f51b5 225deg 270deg,
        #2196f3 270deg 315deg,
        #4caf50 315deg 360deg
    );

    box-shadow:
    0 0 40px rgba(0,0,0,0.4),
    0 0 60px rgba(255,255,255,0.08);

    transition:0.3s ease;
}

/* SHAKE EFFECT */

@keyframes shake{

    0%{transform:rotate(0deg);}
    25%{transform:rotate(1deg);}
    50%{transform:rotate(-1deg);}
    75%{transform:rotate(1deg);}
    100%{transform:rotate(0deg);}
}

.dashboard:hover .pie{
    animation:shake 0.35s ease;
}

/* CENTER */

.center{

    position:absolute;

    width:220px;
    height:220px;

    border-radius:50%;

    background:#071120;

    border:6px solid white;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    z-index:10;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    box-shadow:
    0 0 25px rgba(255,255,255,0.2);
}

.center h1{

    color:white;
    font-size:1.5rem;
    line-height:1.4;
}

/* SLICE TEXT */

.slice{

    position:absolute;

    width:130px;
    height:130px;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    color:white;
    font-weight:bold;

    line-height:1.2;

    padding:10px;

    z-index:20;

    cursor:pointer;

    transition:0.3s ease;

    border-radius:50%;
}

/* HOVER */

.slice:hover{

    transform:scale(1.12);

    backdrop-filter:blur(5px);

    background:rgba(255,255,255,0.15);

    box-shadow:
    0 0 25px rgba(255,255,255,0.4);
}

/* TEXT INSIDE PIE LIKE YOUR IMAGE */

/* TOP */
.s1{
    top:55px;
    left:285px;
}

/* TOP RIGHT */
.s2{
    top:145px;
    right:90px;
}

/* RIGHT */
.s3{
    top:285px;
    right:30px;
}

/* BOTTOM RIGHT */
.s4{
    bottom:145px;
    right:90px;
}

/* BOTTOM */
.s5{
    bottom:55px;
    left:285px;
}

/* BOTTOM LEFT */
.s6{
    bottom:145px;
    left:90px;
}

/* LEFT */
.s7{
    top:285px;
    left:30px;
}

/* TOP LEFT */
.s8{
    top:145px;
    left:90px;
}

/* MOBILE */

@media(max-width:800px){

    .dashboard{
        width:95vw;
        height:95vw;
    }

    .center{
        width:32%;
        height:32%;
    }

    .center h1{
        font-size:0.9rem;
    }

    .slice{
        width:18%;
        height:18%;
        font-size:0.52rem;
    }
}

</style>
</head>

<body>

<div class="dashboard">

    <!-- PIE -->
    <div class="pie"></div>

    <!-- CENTER -->
    <div class="center">

        <h1>
            CTO<br>
            DASHBOARD
        </h1>

    </div>

    <!-- TEXT INSIDE PIE -->

    <div class="slice s1"
    onclick="openPage('philosophies.html')">

        PHILOSOPHIES<br>
        VISION & MISSION

    </div>

    <div class="slice s2"
    onclick="openPage('meeting.html')">

        MEETING &<br>
        SCHEDULE

    </div>

    <div class="slice s3"
    onclick="openPage('todo.html')">

        THINGS<br>
        TO DO

    </div>

    <div class="slice s4"
    onclick="openPage('budget.html')">

        TECHNICAL<br>
        BUDGET

    </div>

    <div class="slice s5"
    onclick="openPage('technical.html')">

        PROJECTS &<br>
        OPERATIONS

    </div>

    <div class="slice s6"
    onclick="openPage('warehouse.html')">

        WAREHOUSE &<br>
        LOGISTICS

    </div>

    <div class="slice s7"
    onclick="openPage('future.html')">

        FUTURE<br>
        PLANS

    </div>

    <div class="slice s8"
    onclick="openPage('goals.html')">

        GOALS &<br>
        TARGETS

    </div>

</div>

<script>

function openPage(page){

    alert("Opening: " + page);

    // window.location.href = page;
}

</script>

</body>
</html>
