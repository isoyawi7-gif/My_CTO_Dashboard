<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTO Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* MAIN CONTAINER */
.dashboard{
    position:relative;
    width:90vw;
    max-width:750px;
    aspect-ratio:1/1;
}

/* PIE */
.pie{
    width:100%;
    height:100%;
    border-radius:50%;
    position:relative;

    background:
    conic-gradient(
        #d4af37 0deg 45deg,
        #b8860b 45deg 90deg,
        #d4af37 90deg 135deg,
        #b8860b 135deg 180deg,
        #d4af37 180deg 225deg,
        #b8860b 225deg 270deg,
        #d4af37 270deg 315deg,
        #b8860b 315deg 360deg
    );

    box-shadow:
    0 0 40px rgba(255,215,0,0.3),
    inset 0 0 40px rgba(0,0,0,0.8);
}

/* PIE LINES */
.line{
    position:absolute;
    width:4px;
    height:50%;
    background:#111;
    top:0;
    left:50%;
    transform-origin:bottom center;
    z-index:2;
}

.l1{ transform:translateX(-50%) rotate(0deg); }
.l2{ transform:translateX(-50%) rotate(45deg); }
.l3{ transform:translateX(-50%) rotate(90deg); }
.l4{ transform:translateX(-50%) rotate(135deg); }
.l5{ transform:translateX(-50%) rotate(180deg); }
.l6{ transform:translateX(-50%) rotate(225deg); }
.l7{ transform:translateX(-50%) rotate(270deg); }
.l8{ transform:translateX(-50%) rotate(315deg); }

/* CENTER CIRCLE */
.center{
    position:absolute;
    width:42%;
    height:42%;
    background:#111;
    border:5px solid gold;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:5;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;

    box-shadow:
    0 0 25px rgba(255,215,0,0.4),
    inset 0 0 20px rgba(255,215,0,0.2);
}

.center h1{
    color:gold;
    font-size:1.5rem;
    line-height:1.4;
}

/* INTERACTIVE SLICES */
.slice{
    position:absolute;
    width:120px;
    height:120px;
    z-index:10;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    color:white;
    font-weight:bold;
    font-size:0.82rem;
    line-height:1.2;

    cursor:pointer;
    transition:0.3s ease;
    border-radius:20px;
}

.slice:hover{
    transform:scale(1.1);
    background:rgba(255,215,0,0.95);
    color:black;
    box-shadow:0 0 25px gold;
}

/* POSITION EACH TITLE INSIDE ITS SLICE */

.s1{
    top:10%;
    left:37%;
}

.s2{
    top:20%;
    right:10%;
}

.s3{
    top:42%;
    right:5%;
}

.s4{
    bottom:18%;
    right:13%;
}

.s5{
    bottom:8%;
    left:37%;
}

.s6{
    bottom:18%;
    left:13%;
}

.s7{
    top:42%;
    left:5%;
}

.s8{
    top:20%;
    left:10%;
}

/* MOBILE */
@media(max-width:600px){

    .slice{
        width:90px;
        height:90px;
        font-size:0.62rem;
    }

    .center h1{
        font-size:1rem;
    }
}

</style>
</head>

<body>

<div class="dashboard">

    <!-- PIE -->
    <div class="pie"></div>

    <!-- DIVIDER LINES -->
    <div class="line l1"></div>
    <div class="line l2"></div>
    <div class="line l3"></div>
    <div class="line l4"></div>
    <div class="line l5"></div>
    <div class="line l6"></div>
    <div class="line l7"></div>
    <div class="line l8"></div>

    <!-- CENTER -->
    <div class="center">
        <h1>
            CHIEF<br>
            TECHNICAL<br>
            OFFICER<br>
            DASHBOARD
        </h1>
    </div>

    <!-- 8 INTERACTIVE PIE SLICES -->

    <div class="slice s1" onclick="openPage('goals.html')">
        Goals &<br>Targets
    </div>

    <div class="slice s2" onclick="openPage('policies.html')">
        Policies &<br>Philosophies
    </div>

    <div class="slice s3" onclick="openPage('meeting.html')">
        Meeting &<br>Schedule
    </div>

    <div class="slice s4" onclick="openPage('todo.html')">
        Things<br>To Do
    </div>

    <div class="slice s5" onclick="openPage('budget.html')">
        Technical Budget<br>
        (CAPEX/OPEX)
    </div>

    <div class="slice s6" onclick="openPage('technology.html')">
        Technology
    </div>

    <div class="slice s7" onclick="openPage('projects.html')">
        Projects
    </div>

    <div class="slice s8" onclick="openPage('operations.html')">
        Operations &<br>Future Plans
    </div>

</div>

<script>

function openPage(page){

    // LINK TO REAL PAGES LATER
    alert("Opening " + page);

    // Example:
    // window.location.href = page;
}

</script>

</body>
</html>
