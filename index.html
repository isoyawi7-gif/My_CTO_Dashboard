<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTO Workspace Login</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* BACKGROUND */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    radial-gradient(circle at top,
    #2d63c8 0%,
    #0b1f4d 45%,
    #020817 100%);
}

/* STARS EFFECT */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(rgba(255,255,255,0.6) 1px, transparent 1px);
    background-size:140px 140px, 220px 220px;
    opacity:0.35;
}

/* LOGIN BOX */
.login-container{
    position:relative;
    width:380px;
    padding:40px;
    border-radius:22px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:
    0 0 40px rgba(0,0,0,0.4),
    inset 0 0 20px rgba(255,255,255,0.08);

    text-align:center;
    z-index:2;
}

/* TITLE */
.login-container h1{
    color:#fff;
    font-size:2rem;
    margin-bottom:8px;
}

.login-container h2{
    color:#d8d8d8;
    font-size:0.95rem;
    font-weight:normal;
    margin-bottom:30px;
}

/* INPUT BOX */
.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;

    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.15);

    color:#fff;
    font-size:1rem;
}

.input-box input::placeholder{
    color:#ddd;
}

/* BUTTON */
.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;

    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:#fff;

    font-size:1rem;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
    box-shadow:0 0 20px rgba(0,114,255,0.4);
}

.login-btn:hover{
    transform:scale(1.03);
    box-shadow:0 0 30px rgba(0,114,255,0.7);
}

/* ERROR */
#error{
    margin-top:15px;
    color:#ffb3b3;
    font-size:0.9rem;
}

</style>

</head>

<body>

<div class="login-container">

    <h1>ISO YAWI</h1>
    <h2>CTO Workspace Access Portal</h2>

    <!-- USERNAME -->
    <div class="input-box">
        <input type="text" id="username" placeholder="Enter Username">
    </div>

    <!-- PASSWORD -->
    <div class="input-box">
        <input type="password" id="password" placeholder="Enter Password">
    </div>

    <!-- BUTTON -->
    <button class="login-btn" onclick="login()">LOGIN</button>

    <!-- ERROR -->
    <div id="error"></div>

</div>

<script>

<script>

function login(){

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if(username === "admin" && password === "admin"){

        /* ✅ SET LOGIN SESSION */
        localStorage.setItem("loggedIn", "true");

        /* GO TO DASHBOARD */
        window.location.href = "dashboard.html";
    }
    else{
        document.getElementById("error").innerText =
        "Invalid Username or Password";
    }
}

</script>

</script>

</body>
</html>
